  text: 紫陽眞人内傳翔十紫陽眞人本姓周諱義山宇季通汝陰人也漢丞相周勃七世之孫以冠族播流世居貴官祖父玄元鳳元年爲青州刺史父祕爲范陽令時君始生焉父後積秩累遷官至陳留史君時年十六隨從在郡始讀孝經論語周易爲人沉重少於言笑喜怒不形於色好獨坐靜處不結名好然精恩微密所存必感常以平旦之後曰出之初正東向立漱口嚥液服氣百數向日再拜旦旦如此爲之經年父怪而問之所行何等君長跪對曰義山中心好此日光長景之暉是以拜之耳至月朔旦之日輒遊行市及閭閻陋巷之中見貧乏飢餓之人輒解衣與之時時登上名山喟然悲歎或入石室之中歡然獨笑時陳留大多名士聞君盛德體性沉美咸修詣焉君輒稱疾不見賔客漢侍中蔡咸陳留高士亦頗知道聞君德行數往詣君輒辭疾不欲見之父乃大怪怒責之督切使出逼不得已遂出相見咸大發請問及論神仙之道變化之事君乃凝默内閉歛神虚靜頷而和之一不答也是歲大旱陳留大荒斗米千錢路多飢民君乃傾財竭家以濟其困陰而行之人亦不知是君之慈施也對萬物如臨赤子斯陰積善德仁逮之施矣又有黄泰者寓在陳留婦兒無有單身隻立了無親戚人亦不知其所從來常著故敗皮袴角皮褶恒賣芒履在陳留市中君常潜行經過市中見泰衣束殊弊君每曾聞仙方說云仙人目瞳子正方而黄泰雖復外形帶索曰方面光密而奇之中心猶喜還歸數使人買芒履因以金銀錢帛著其物中陰以與之數數行之如此非一黄泰遂詣君君見迎而拜之將入靜室乃是中嶽仙人泰曰聞君好道陰德流行用恩微妙感於我是以相詣吾是中嶽仙人蘇林字子玄也本衛人靈公末年生少好道德受學於岑先生岑先生見授鍊身消灾之近術後又傳仇公仇公乃見教以服氣之法還神守魂之事吾行之甚驗大得其益仇公見吿云術識盡此不能使子白日升天上爲眞官也致吾於涓子涓子者中仙人也守之彌年見教守三一之法曰三一者太微之玄眞上清之元圖一曰洞眞二曰妙經三曰素靈東海小童君藏之於靈景之城琳霄之室非有仙籍者不授矣此書淵祕非賢勿宣汝有至心故以相付八節存之一則消除萬害一則形軀不敗能守之致雲車羽蓋坐造風雨激電砰磕矣乃地仙之美術長生之眞法吾因受之得以遊翔名山往來方諸之館寢息丹陵之丘看望八表得意而栖從容以來數百年中良爲樂足樂足而思此居泰而不復否非順天行化與時消息之謂也故以投身臭濁觀化囂藹賣履弊作唯下是居自謂庸庸不能甄識朱碧於凡壤之中矣而子猶有察眞之鑒數獲惠遺非所悟也欣子有尚故來相詣君再拜頓首數十悲喜自搏膝行而進自陳少好長生唯願登仙度世夙夜靜思願與眞人相遇沐浴素流禀受奇訣今靈啓神降得接聖顔千秋志願慶莫大焉乃復頓頭請乞奇要仙人曰子坐吾將告子子少知還陽精髓不泄又知導引服氣吞景嚥漿不復須陰丹内術補胎之益也然猶三蟲未壞三尸未死故導引服氣不得其理可先服制蟲細丸以殺穀蟲蟲有三名一名青古二名白姑三名血尸謂之三蟲在内令心煩滿意志不開所思不固失食則飢悲愁感動精志不至仍以飲食不節斷也雖復穀斷人體重滯奄奄淡悶所夢非眞顛倒飜錯邪俗不除皆由於蟲在其内揺動五藏故也殺之方用附子五兩麻子七升地黄六兩茱萸根大者七寸术七兩桂四兩雲芝英五兩凡七種先取菖蒲根煮醲作酒使清醇重美一斗半以七種藥㕮咀内器中漬之亦可不用㕮咀三宿乃出暴之令燥又取前酒汁漬之三宿又出暴之須酒盡乃止暴令燥内鐵臼中擣之下細簁令成粉取白蜜和之令可丸以平旦東向初服二丸如小豆漸益一丸乃可至十餘丸也治腹内疾實上氣心胸結塞益肌膚令體輕有華光盡一劑則穀蟲死蟲死則三尸枯枯則自然落矣亦可數作不限一劑也然後合四填丸加曾青黄精各一兩以斷穀畢可導引服氣不得其理可先服食衆草巨勝茯苓术桂天門冬黄連地黄大黄桃糛及皮任擇焉雖服此藥以得其力不得九轉神丹金液之道不能飛仙矣爲可延年益壽不辟其死也君按次爲之服食术五年身生光澤徹視内見五藏乃就仙人求飛仙要訣仙人曰藥有數種仙有數品有乘雲駕龍白日昇天與太極眞人爲友拜爲仙官之主其位可司眞公定元公太生公及中黄大夫九氣丈人仙都公此位皆上仙也或爲仙卿或爲仙大夫上仙之次也遊行五嶽或造太清役使鬼神中仙也或受封一山總領鬼神或遊翔小有羣集清虚之宫中仙之次也若食穀不死日中無影下仙也或白日尸解過死太陰然後乃下仙之次也我受涓子祕要善守三一之道役使鬼神受太極帝君眞印封掌名山以得不死亦是金闕帝君眞書之首衆妙之大訣但吾所學少成地仙人也子名上金書於方諸之宫命登青録爲宇所謂金閭玉名已定於天曹矣必能乘雲駕龍上造以紫陽太清佩金眞玉光龍衣虎帶拜爲眞人我之道術可教陸仙尸解之人耳非子眞人所可學也且我是中仙耳不足以爲子師然守一鍊神雖非上眞之道亦是中眞地仙之好事亦能朝千山之神攝川澤之精吐故於七華之下納新於三宫之上禮乎赤子謁乎眞人恭乎嬰兒三眞者乃身宅之帝君混二十四氣分入太微又分號二十四眞能善斯道於三寸之間則三宫眞人可見見則雲車羽蓋千乘萬騎可見而得乘御也列名九圖飛行上清上元用立春從東斗來還中元用立夏從南斗來還下元用立冬從北斗來還三氣上昇身亦存之日之四節一之往反也其法鮮矣其用浩矣其事近矣其生長矣苟得其道亦變形萬端身出水火收束虎豹役使鬼神也子亦復宜知此道以漸升進耳今以守三一之法靈妙小有之書二百事傳子石菌朱柯若乾芝與子服之吾道畢矣不爲試子也吾行當被玄洲召去三十日近比者之頃當時相詣以啓子之未悟爾自行哉可遠索師也必欲該道眞妙窮微極素當艱苦嶮試浮遊五嶽雖遇眞人未即授子眞道也不百餘年雲車羽蓋龍虎之袍未可得也君再拜受教退齋沐浴五香七日七夜不寐但危坐接手存念至道乃以平旦燒香北向再拜服此神芝五年之間視見千里之外身輕能超十丈日步行五百里能隱能彰坐在立亡能巡行名山尋索仙人聞有欒先生者得道在蒙山能讀龍蹻經乃追尋之入蒙山大洞黄庭之中遇衍門子乘白鹿執羽蓋杖青毛之節侍從十餘玉女遇於黄庭君乃再拜頓頭乞長生要訣門子曰子名在丹臺之中何憂不仙乎王屋清虚洞宫大多仙人子始學宜登此山乃越江河登此何索君對曰聞有欒先生得道此山能讀龍蹻經故來欲見而受之耳門子曰欒先生仙之下耳子乃眞人也以眞問仙不亦煩乎子遇眞人乃子之師也中仙已下非子所學乃出龍蹻經以授之三皇内文以召神靈以劾百鬼乃退齋少室山三月乃遊登王屋山發洞門入丹室大遇仙人皆披素讀經見君皆起立有趙他子授君芝圖十六首受五行祕符而退齋復登王屋山遇黄先生受黄素神方五帝六甲左右靈飛之書四十四訣乃退登嶓冢山遇上魏君受太素傳左乙混洞東蒙之籙右庚素文攝殺之律乃退齋三月登嵩高山入洞門遇中央黄老君游觀丹城潜行洞庭合會仙人在嵩高山太室洞門之内以紫雲爲蓋柔玉爲床鳳衣神冠佩眞執節左帶流金之鈴右帶八光之策神虎俠洞門靈狩衛太室左侍者清眞小童右侍者太和玉女各百餘人捧神醴之琬詠大洞眞經三十九章誦大有妙經二十四章修太上素靈二十一曲其中庭有青腰玉女執玄玉南震之燈散花燒香衛黄老君黄老君巾三華九陽之巾手彈流徵雲珠素琴被服金光天姿嚴峻眼有電精口含玉膏君既至頓頭再拜乞長生度世願上佐仙宫黄老君曰子存洞房之内見白元君耶君對曰實存洞房嘗見白元君黄老君曰子道未足矣且復游行受諸要訣當以上眞道經授子也子見白元君未見无英君且復行也君再拜受教復頓頭乞得侍接龍車爲遊走之使黄老君曰洞房之内至精之中有大神不可名安出紫房遊戲丹田上通太微乃下洞玄小有爲白元君大有爲无英君見白元君下仙之事也可壽三千年若見无英君乃爲眞也可壽一萬年可精更存之不試子也君再拜受教而退遊行天下名山大澤西登白空山遇沙野帛先生受泰清上經退登峨嵋山入中空洞金府遇寧先生受太丹隱書八禀十訣退登岷山遇陰先生受九赤斑符退登岐山遇臧延甫受憂樂曲素訣辭乃登梁山遇淮南子成受天關三圖乃退登牛首山遇張子房受太清眞經乃退登九嶷山遇李伯陽受李氏幽經乃遊登鍾山遇高丘子受金丹方二十七首乃登鶴鳴山遇陽安君受金液丹經九鼎神丹圖乃登猛山遇青精先生受黄素傳乃登陸渾山潜入伊水洞室遇李子耳受隱地八術乃登戎山遇趙伯玄受三九素語乃登陽洛山遇幼陽君受青要紫書三五順行乃登霍山遇司命君受經命青圖上皇氏紀籍乃登鳥鼠山遇墨翟子受紫度炎光内視圖中經乃登曜名山遇太帝候夜神童受金根之經乃登委羽山遇司馬季主受石精金光藏景化形乃登大庭山遇劉子先受七變神法乃登都廣登建木遇谷希子受黄氣之法太空之術陽精三道之要乃登桐栢山遇王喬受素奏丹符乃登太華山遇南嶽赤松子受上元眞書乃登太冥山遇九老仙都君受黄水月華四眞法乃至合梨山遇皇人受八素眞人經太上隱書乃登景山遇黄臺萬畢先生受九眞中經乃登玄龍羽野遇玉童十人九氣丈人得白羽紫蓋服黄水月華法乃到桑林登扶廣山遇青眞小童君受金書祕字乃退南行朱火登丹陵山遇龔仲陽受仙忌眞記乃西遊登空山見无英君西㫰洞房中无英君處其左白元君處其右黄老君處其中无英君被服金精之錦朱碧玉綾之袍光赤朝霞流景曜天腰太上靈氣之章佩九章祛邪之策著翠上紫龍之冠蓋太玄丹靈上元赤子之祖父也左運青宫之氣氣灌萬神乃未有天地先自虚空而生矣白元君被服丹玉之錦雲羅重袍白光内朱流景參天垂暉映神玄黄徹虚腰太上靈精之章佩玄元攝魔之策著招龍造冠蓋玉房雲庭上元赤子之父右夾皓清之室朝運生者也中央黄老君是太極四眞王之師老矣上攝九天中遊崑崙黄闕來其外紫户在其内下與二君入人洞房員三寸威儀具焉夫至思神見得爲眞人若見白元得爲下眞壽三千若見无英得爲中眞壽萬年若見黄老與天相傾上爲眞人列名金臺君既見之乃再拜頓首乞丐上眞要訣黄老君可還視子洞房中君乃暝目内視良乆果見洞房之中有二大神无英白元君也被服狀如在空山中者黄老君笑而言微乎深哉子用意恩之精也此白日昇天之道子還登常山授子上眞之道君乃還登常山石室中齋戒念道復積九十餘年中无英君黄老君遂便授之大洞眞經三十九篇有玉童二十一人玉女二十一人皆侍直燒香晝夜習之積十一年遂乘雲駕龍白日昇天上詣太微宫受書爲紫陽眞人佩黄旄之節八威之策帶流金之鈴服自然之衣食玉醴之𥹋飲金液之漿治葛衍山金庭銅城所謂紫陽宫也紫陽有八眞人君處其右一月三登崑崙一朝太微帝君以嶓冢爲紫陽别宫所謂洞庭潜宫也嶓冢山有洞穴潜行通王屋清虚小有天亦潜通閬風也眞人曰天無謂之空山無謂之洞人無謂之房也山腹中空虚是爲洞庭人頭中空虚是爲洞房是以眞人處天處山處人入無間以黍米容蓬萊山包括六合天地不能載焉唯精思存眞守三宫朝一神勤苦念之必見无英白元黄老在洞房焉雲車羽蓋既來便成眞人先守三一乃可遊遨名山尋西㫰洞房也此要言矣眞人周君曰諸應得仙道皆先百過小試之皆過仙人所保舉者乃勑三官乞除罪名下太山除死籍度名仙府仙府乃十二大試太極眞人下臨之上過爲上仙中過爲地仙下過白日尸解都不過者不失尸解也尸解上下主者耳不得稱仙也蘇子玄後亦被玄洲召爲眞命上卿一旦於陳留乘雲車驂龍虎侍者羽蓋而昇天也同時多有見者冉冉西北昇良乆雲氣覆之遂絶教周君守三一法靈妙之言近二百事涓子即子玄之師涓子似齋人少好餌术接食其精精恩感天後釣於河澤見東海小童語之曰釣得鯉者剖之後果得而剖魚腹獲金闕帝君守三元眞一之法於是遂隱於橐山能致風雨學道在世二千七百年一旦告人云被大微召補仙公遂去而不知所終矣語子玄曰斗中三一宜以節日祀之爲二十年三一見矣見則長生成仙家有三一長生不滅能存三一名上玉札能存洞房與天相望能存三元上爲眞仙皇天上清金闕帝君所以乘雲迅龍周行九天者寔洞房三元眞一之事也吾食术精三百年服氣五百年精恩六百年守三一三百年守洞房六百年守玄丹五百年周遊名山看望八海徊遊五嶽休息洞室樂林草之垂條忻鳥獸之相噭川瀆吐精丘陵蓊鬱百物之秀寒暑之節弋釣長流遨遊玄瀨靜心山岫念眞養氣呼召六丁玉女見衛展轉六合無所不逮守形思仙二千七百餘歲實樂中仙不營當世今卒被召請從此别云涓子是臨去之時著書與子玄别玄丹者泥丸也其義出太上素靈經守三一得爲地仙守洞房得爲眞人守玄丹升太微宫也勤而行之自得此書此言信矣非賢慎泄之眞人之言不得見太平有志道而隱者可示此書耳子其慎之寧勿宣
