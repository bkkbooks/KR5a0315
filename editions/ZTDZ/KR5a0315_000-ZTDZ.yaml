body:
  text: 摹召法主本本是晋隆安三年太歲己亥正月七日甲子書畢又注云周君後漢元鳳元年太歳辛丑七月五日己卯生到元康元年太歲丙辰師蘇君受三一貞白條例云有三千四百八十八字今數有三千四百八十九字不知何字是長不容輒試周君所受道眞書目録金闕帝君守三元眞一法東海小童傳涓子涓子傳蘇子蘇子傳周子尋欒先生龍蹻經於蒙山大洞黄庭之中遇衍門子受龍蹻經并三皇内文在黄庭之中趙他子芝圖十六首五行祕符在王屋洞門丹室中王先生黄素神方五帝六甲左右靈飛之書及二十四訣在王屋山中上魏君太素傳左乙混洞東蒙之籙右攝殺之律在嶓冢山中太和玉女大有妙經太上素靈經在丹城銅之内沙野帛先生泰清上經在白雲山中甯先生大丹隱書八禀十訣在峨嵋山金匱府中陰生先九赤斑符在岷山中臧延甫憂樂曲素訣辭在帔山中淮南子成天關三圖在梁山中張子房泰清眞經在牛首山中李氏幽神經在九嶽山中高丘子金丹方二十七首在鍾山中陽安君金液丹經九鼎神丹圖在鶴鳴山中青精先生八表黄素傳在猛山中李子耳隱地八術在陸渾山潜入伊川洞室中趙伯玄三九素語在峨嵋山中幼陽君丹宇紫書三五順行在陽洛山中司命君經命青圖上皇籍在大霍山中墨翟子受紫度炎光内視中方在鳥鼠山中太帝候夜神童金根之經在曜冥山中司馬季主石精金光藏景化形法在委羽山中劉子先七變神法在大庭山中谷希子黄氣之法泰空之術陽精三道之要在都廣建木山中王子喬素奏丹符在桐栢山中南嶽赤松子上元眞書在太華山中九老仙都君黄水月華四眞法在太冥山中皇人八素眞經太上隱書在合梨山中萬先生九眞中經在景山黄臺中玉童子十人九氣丈人得白羽紫蓋黄水月華在玄壟羽野青眞小童君金書祕字在扶廣山中龔仲陽仙忌眞記在朱火丹陸之室中央黄老君大洞眞經三十九篇在常山中受右周君所受諸經書目二眞人作詩曰策駕玄中漠庇素扶琋林妙微混沌遘長翻朱煙岑八景停玉輪清軒覽明眞左攝飛行遊右顧凌八天洞豁辨協晨仰感發皇人至暢理自會靈妙體豈珍西玄鬱絶根高耀拂輝明眇眇流遐澄育光拔皓清房素重離裏安妙寄蘭生命駕飛八景迅集迴南傾凌厲陽羽野結嘯八極城萬里誰云遐我超不稽靈誘會有素娱端駕講所精至道方朗豁知來温新齡晨應載景陽攀暉德所鍾徘徊重玄巓翻焉降飛龍參騰八紘外翱翔閶圔方藂風生丹室雲合窈寥中迭域谷希子值素潜太空長錦中有景永煙被山容空絶廣寒宅混洞道沌同積靜八朗豁素阿蒙長通我汎陽寥景虚煙動清風嗷嘈太微觀崚嶒九玄所中有執寂賔洞嘯靜寒處西有六領師尋輝與曉語來非皇人賔去非飛仙旅我超騰羽蓋徘徊清泠渚豁虚八極上清煙凌飄舉命駕出三玄流鈴飛漢賔皇皇太和庭鬱儀清虚觀結璘絶煙際尋輝七靈焕素遨淩紫天洞遊無名館龍旂迴瓊輪四㫰應景散聊且期時通温之至道旦周裴二眞叙江乘令晋陵華僑世奉俗神忽夢見羣鬼神與之遊行飲食羣鬼所與僑共飲酒僑亦至醉還家輒吐所飲噉之物數年諸鬼遂課限僑舉才僑不得已先後所舉十餘人皆至死亡鬼以僑所舉得才有知人之識限課轉多若小稽違便彈治之僑自懼必爲諸鬼所困於是背俗入道詣祭酒丹陽許治受奉道之法羣鬼各便消散不復來往奉道數年忽夢見二人年可五十容儀衣服非常後遂二人見或一月三十日時時往來僑家靖室中唯僑得見一人姓周一人姓裴裴雅重才理非僑所申周似不如此二人先後教授僑經書書皆與五千文相參多說道家誡行養性事亦有䜟緯所受二人經書皆隱祕不宣周自作傳裴作未成裴所作樂序及周傳如别紫陽眞人内傳終
